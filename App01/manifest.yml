modules:
  jira:issuePanel:
    - key: azure-devops-connect-panel
      resource: main
      resolver:
        function: resolvers
      render: native
      title: Azure DevOps
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  function:
    - key: resolvers
      handler: index.handler

resources:
  - key: main
    path: src/index.jsx

app:
  id: ari:cloud:ecosystem::app/azure-devops-connect

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
    - act-as-app:all

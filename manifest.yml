app:
  id: "ari:cloud:ecosystem::app/azure-devops-connect"
  runtime:
    name: nodejs22.x
  licensing:
    enabled: false

permissions:
  scopes:
    - "read:jira-work"
    - "write:jira-work"
    - "read:jira-user"
  external:
    fetch:
      backend:
        - "dev.azure.com"

modules:
  jira:
    - key: azure-devops-admin-page
      name: Azure DevOps Connect
      resource: admin-page
      resolver:
        function: admin-resolver
  function:
    - key: admin-resolver
      handler: src/resolvers/admin.handler
  webtrigger:
    - key: azure-devops-webhook
      name: Azure DevOps Webhook
      function: webhook-fn
  function:
    - key: webhook-fn
      handler: src/resolvers/webhook.handler
